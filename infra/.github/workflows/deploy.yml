name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-northeast-2

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      backend: ${{ steps.filter.outputs.backend }}
      ai: ${{ steps.filter.outputs.ai }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'frontend/**'
            backend:
              - 'backend/**'
            ai:
              - 'services/ai-service/**'

  deploy-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build & Push
        run: |
          docker build -f infra/docker/Dockerfile.web -t ${{ steps.ecr.outputs.registry }}/ainovel-web:${{ github.sha }} .
          docker push ${{ steps.ecr.outputs.registry }}/ainovel-web:${{ github.sha }}

  deploy-api:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build & Push
        run: |
          docker build -f infra/docker/Dockerfile.api -t ${{ steps.ecr.outputs.registry }}/ainovel-api:${{ github.sha }} .
          docker push ${{ steps.ecr.outputs.registry }}/ainovel-api:${{ github.sha }}

  deploy-ai:
    needs: changes
    if: needs.changes.outputs.ai == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build & Push
        run: |
          docker build -f infra/docker/Dockerfile.ai -t ${{ steps.ecr.outputs.registry }}/ainovel-ai:${{ github.sha }} .
          docker push ${{ steps.ecr.outputs.registry }}/ainovel-ai:${{ github.sha }}
